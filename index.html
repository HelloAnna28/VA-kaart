  --bg:#FDFDED; --card:#FFFFFF; --ink:#3F0508;
  --primary:#3F0508; --primary2:#5A1A1C;
  --accent:#F76C04; --accentSoft:#F8BCEF;
  --muted:#8A6B66; --line:#EAE3C6;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Open Sans',-apple-system,'Segoe UI',sans-serif;color:var(--ink);
  background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;padding:28px 18px 56px;}
h1,h2,h3{font-family:'Sodabery','Fraunces',Georgia,serif;font-weight:600;line-height:1.15;margin:0;}
p{margin:0;}
.wrap{max-width:640px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 24px;}
textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:#FFFBF4;
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;resize:vertical;min-height:62px;outline:none;}
textarea:focus{border-color:var(--primary2);box-shadow:0 0 0 3px rgba(63,5,8,.16);}
.btn{font-family:inherit;font-weight:600;font-size:15px;border:none;border-radius:999px;
  padding:12px 22px;cursor:pointer;transition:transform .08s ease,opacity .2s;}
.btn:active{transform:translateY(1px);}
.btn--primary{background:var(--primary);color:#FDFDED;}
.btn--primary:disabled{opacity:.45;cursor:not-allowed;}
.btn--ghost{background:transparent;color:var(--primary);border:1px solid var(--line);}
.btn--accent{background:var(--accent);color:#3F0508;font-weight:700;text-decoration:none;display:inline-block;}
.eyebrow{font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);}
.q{font-weight:600;font-size:15px;margin-bottom:7px;}
.hint{font-size:13px;color:var(--muted);margin-bottom:9px;font-style:italic;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px;}
.progress{height:6px;background:var(--line);border-radius:999px;}
.progress > div{height:6px;background:var(--accent);border-radius:999px;transition:width .3s;}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.dot{width:9px;height:9px;border-radius:50%;background:var(--primary);animation:pulse 1.1s ease-in-out infinite;}
@media print{.noprint{display:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <div style="text-align:center;margin-bottom:22px;">
    <div style="font-family:'Sodabery','Fraunces',serif;font-weight:600;font-size:18px;color:var(--primary);">Anna Marijn</div>
    <div style="font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-top:2px;">Virtual Assistant Coach</div>
  </div>
  <div id="app"></div>
</div>

<script>
const BOOKING_URL = "https://tidycal.com/loyalvacoaching/kennismaking";
const MIRROR_MSG = "Hey! Ik ben bezig met een oefening voor mijn VA-bedrijf en ik heb jouw eerlijke mening nodig. Kun je me vertellen: 1) Waarvoor bel of app je mij als je ergens niet uitkomt? 2) Wat zou jij zeggen als je mij aan iemand anders zou omschrijven? \u2764\uFE0F";

const SECTIONS = [
  { title: "Wat anderen al lang in jou zien",
    intro: "Anderen zien jou vaak helderder dan jij jezelf ziet. Begin hier.",
    qs: [
      { id:"q1", label:"Waar vragen mensen jou altijd om hulp — ook buiten werk, ook privé?" },
      { id:"q2", label:"Wat zeiden collega\u2019s of leidinggevenden dat je goed deed, terwijl jij dacht \u201cmaar dat is toch normaal?\u201d" },
      { id:"q3", label:"Als je beste vriendin jou zou omschrijven aan een ondernemer die hulp zoekt — wat zou ze zeggen?" },
      { id:"q4", label:"Wat zeg jij als iemand je een compliment geeft?", hint:"Als je het wegwuift, is d\u00e1t vaak precies de skill die je verbergt." },
    ] },
  { title: "De goudmijn uit loondienst",
    intro: "Je jaren in loondienst zijn het bewijs dat je al lang doet wat ondernemers nodig hebben.",
    qs: [
      { id:"q5", label:"Welke taken deed jij makkelijk, terwijl collega\u2019s er tegenop zagen of er langer over deden?" },
      { id:"q6", label:"Voor welke vragen of problemen kwamen mensen \u00e9\u00e9rst bij jou?" },
      { id:"q7", label:"Noem een moment waarop iets dankzij jou goed liep. Wat deed je precies?", hint:"Ook als het klein voelt." },
      { id:"q8", label:"Welke klussen rondde je af waarvan anderen zeiden \u201choe doe jij dat zo snel, netjes of rustig?\u201d" },
    ] },
  { title: "Jouw VA-praktijk als spiegel",
    intro: "Je bent al begonnen — dus je hebt al data. Elke klus vertelt iets over je kracht.",
    qs: [
      { id:"q9", label:"Welke klussen voor (proef)klanten gingen jou makkelijk af, terwijl de klant er enorm tegenop zag?" },
      { id:"q10", label:"Waar gaf een klant je een compliment dat jij wegwuifde met \u201cach, dat is gewoon mijn werk\u201d?" },
      { id:"q11", label:"Welke opdrachten neem je nu aan terwijl je er geen energie van krijgt?" },
      { id:"q12", label:"Wat zeg je nu als iemand vraagt wat je doet? Schrijf het letterlijk op.", hint:"Lees het terug: voelt het scherp of vaag?" },
    ] },
  { title: "Energie als kompas",
    intro: "Energie liegt nooit. Wat je energie geeft, is bijna altijd ook iets wat je goed doet.",
    qs: [
      { id:"q13", label:"Welke taken doe jij als eerste, gewoon omdat je er zin in hebt?" },
      { id:"q14", label:"Waarbij verlies jij het gevoel voor tijd?", hint:"Ook buiten werk: hobby\u2019s, klusjes, gesprekken." },
      { id:"q15", label:"Wat doe je in je vrije tijd dat eigenlijk professionele waarde heeft, maar wat je geen \u201cecht werk\u201d noemt?" },
      { id:"q16", label:"Als je vanaf morgen nog maar \u00e9\u00e9n soort klus mag doen voor klanten — welke kies je?" },
    ] },
  { title: "De blinde vlek doorprikken",
    intro: "Blinde vlekken zitten verstopt achter \u201cmaar dat kan toch iedereen?\u201d. Spoiler: nee, dat kan niet iedereen.",
    qs: [
      { id:"q17", label:"Wat vind jij z\u00f3 vanzelfsprekend dat je het nooit een skill zou noemen?" },
      { id:"q18", label:"Wat kunnen anderen aantoonbaar sl\u00e9cht, terwijl jij het moeiteloos doet?" },
      { id:"q19", label:"Waar worden mensen zenuwachtig of gestrest van, terwijl jij er rustig onder blijft?" },
      { id:"q20", label:"Wie probeert iets zelf op te lossen, maar wacht eigenlijk op jou omdat jij het beter of sneller doet?" },
    ] },
  { title: "De echte twijfel onder ogen",
    intro: "Veel gestarte VA\u2019s twijfelen niet omdat ze niet goed genoeg zijn, maar omdat ze zich vergelijken met VA\u2019s die \u201cmeer tools kennen\u201d. Hier kijken we dat recht in de ogen.",
    qs: [
      { id:"q25", label:"Wat denk jij dat de reden is dat klanten (nog) niet voor jou kiezen?" },
      { id:"q26", label:"Met welke VA\u2019s vergelijk jij jezelf — en wat doet die vergelijking met je tarief, zichtbaarheid en aanbod?" },
      { id:"q27", label:"Als een vriendin met exact jouw skills vroeg \u201cben ik goed genoeg?\u201d — wat zou jij tegen h\u00e1\u00e1r zeggen?" },
      { id:"q28", label:"Is jouw twijfel een feit of een aanname? Welk bewijs uit dit werkblad spreekt hem tegen?" },
    ] },
  { title: "Jouw bewijsmuur",
    intro: "Tijd om bewijs te stapelen. Groot of klein, betaald of onbetaald, priv\u00e9 of werk — alles telt.",
    qs: [
      { id:"lijst10", label:"Schrijf de laatste 10 dingen op die jij voor iemand anders hebt gedaan.", hint:"E\u00e9n per regel. Agenda plannen, een mail nalezen, iets uitzoeken, een conflict oplossen\u2026", big:true },
      { id:"q29", label:"Welke taken doe jij telkens opnieuw, voor verschillende mensen?", hint:"Dat patroon is jouw kracht." },
      { id:"q30", label:"Noem 3 concrete dingen die jij hebt georganiseerd, gemaakt of geregeld waar iemand blij van werd." },
      { id:"q31", label:"Heb je ooit iemand geld, tijd of stress bespaard? Wat deed je precies?" },
      { id:"q32", label:"Wat heb jij geleerd — in loondienst of daarbuiten — dat een ondernemer nu meteen kan gebruiken?" },
    ] },
];
const ALL = SECTIONS.flatMap(s => s.qs);

const state = { phase:"intro", si:0, answers:{}, result:null, copied:false };
const app = document.getElementById("app");
const esc = (s) => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const answered = () => ALL.filter(q => (state.answers[q.id]||"").trim()).length;

function render(){
  if(state.phase === "intro") renderIntro();
  else if(state.phase === "form") renderForm();
  else if(state.phase === "loading") renderLoading();
  else if(state.phase === "error") renderError();
  else if(state.phase === "result") renderResult();
}

function renderIntro(){
  app.innerHTML = `
    <div class="card">
      <div class="eyebrow">Werkblad</div>
      <h1 style="font-size:30px;margin:8px 0 14px;">Jij kunt meer dan je verkoopt</h1>
      <p style="color:var(--muted);margin-bottom:16px;">Je kunt je werk goed. Maar als iemand vraagt \u201cwat doe jij precies?\u201d, hoor je jezelf iets vaags zeggen. Het probleem is niet dat jij niets bijzonders kunt — je vindt je kracht z\u00f3 vanzelfsprekend dat je hem zelf niet meer ziet. Dit werkblad helpt je hem terug te vinden: zwart op wit, met bewijs.</p>
      <p style="font-size:14px;color:var(--muted);margin-bottom:22px;">7 korte delen \u00b7 \u00b1 10\u201315 minuten \u00b7 je antwoorden blijven op dit scherm. Aan het eind krijg je je persoonlijke VA Kracht Kaart.</p>
      <button class="btn btn--primary" id="start">Start het werkblad</button>
    </div>`;
  document.getElementById("start").onclick = () => { state.phase="form"; render(); };
}

function renderForm(){
  const sec = SECTIONS[state.si];
  const qsHtml = sec.qs.map(q => `
    <div style="margin-bottom:20px;">
      <div class="q">${esc(q.label)}</div>
      ${q.hint ? `<div class="hint">${esc(q.hint)}</div>` : ""}
      <textarea data-id="${q.id}" placeholder="Jouw antwoord\u2026" style="${q.big?'min-height:130px;':''}">${esc(state.answers[q.id]||"")}</textarea>
    </div>`).join("");

  const last = state.si === SECTIONS.length - 1;
  app.innerHTML = `
    <div class="noprint" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px;">
        <span>Deel ${state.si+1} van ${SECTIONS.length}</span><span>${answered()} vragen ingevuld</span>
      </div>
      <div class="progress"><div style="width:${((state.si+1)/SECTIONS.length)*100}%"></div></div>
    </div>
    <div class="card">
      <div class="eyebrow">Deel ${state.si+1}</div>
      <h2 style="font-size:23px;margin:6px 0 10px;">${esc(sec.title)}</h2>
      <p style="color:var(--muted);font-size:14.5px;margin-bottom:22px;">${esc(sec.intro)}</p>
      ${qsHtml}
    </div>
    <div class="row noprint">
      ${state.si>0 ? `<button class="btn btn--ghost" id="back">Terug</button>` : ""}
      ${!last ? `<button class="btn btn--primary" id="next">Volgende deel</button>` : ""}
      ${last ? `<button class="btn btn--primary" id="gen" ${answered()<5?"disabled":""}>Genereer mijn VA Kracht Kaart</button>` : ""}
      ${last && answered()<5 ? `<span style="font-size:13px;color:var(--muted);">Vul het liefst alle vragen in, dat geeft de beste kaart.</span>` : ""}
    </div>`;

  app.querySelectorAll("textarea").forEach(t => {
    t.addEventListener("input", e => { state.answers[e.target.dataset.id] = e.target.value; updateCounter(); });
  });
  const back = document.getElementById("back"); if(back) back.onclick = () => { state.si--; scrollTo(0,0); render(); };
  const next = document.getElementById("next"); if(next) next.onclick = () => { state.si++; scrollTo(0,0); render(); };
  const gen = document.getElementById("gen"); if(gen) gen.onclick = generate;
}

function updateCounter(){
  const c = document.querySelector(".noprint span:last-child"); // counter span
  // re-render lightweight bits without losing focus: only update counter + gen button state
  const counters = document.querySelectorAll(".noprint > div > div span");
  if(counters[1]) counters[1].textContent = `${answered()} vragen ingevuld`;
  const gen = document.getElementById("gen");
  if(gen) gen.disabled = answered() < 5;
}

function renderLoading(){
  app.innerHTML = `
    <div class="card" style="text-align:center;">
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:18px;">
        <div class="dot"></div><div class="dot" style="animation-delay:.2s"></div><div class="dot" style="animation-delay:.4s"></div>
      </div>
      <h2 style="font-size:20px;margin-bottom:8px;">Je kracht wordt zwart op wit gezet\u2026</h2>
      <p style="color:var(--muted);font-size:14px;">Even geduld, ik lees al je antwoorden en haal de rode draad eruit.</p>
    </div>`;
}

function renderError(){
  app.innerHTML = `
    <div class="card">
      <h2 style="font-size:20px;margin-bottom:8px;">Er ging iets mis</h2>
      <p style="color:var(--muted);margin-bottom:18px;">Het lukte niet om je kaart te genereren. Probeer het opnieuw.</p>
      <button class="btn btn--primary" id="retry">Opnieuw proberen</button>
    </div>`;
  document.getElementById("retry").onclick = generate;
}

function renderResult(){
  const r = state.result || {};
  const pills = (r.helptMet||[]).map(x => `<span style="background:var(--accentSoft);color:#3F0508;font-size:13.5px;font-weight:600;padding:7px 13px;border-radius:999px;">${esc(x)}</span>`).join("");
  const proof = (r.bewijsmuur||[]).map(x => `<div style="background:#FFFBF4;border:1px solid var(--line);border-left:3px solid var(--primary);border-radius:8px;padding:10px 13px;font-size:14.5px;">${esc(x)}</div>`).join("");
  app.innerHTML = `
    <div>
      <div class="card" style="border-top:5px solid var(--accent);">
        <div class="eyebrow">Jouw VA Kracht Kaart</div>
        <h1 style="font-size:26px;margin:10px 0 4px;color:var(--primary);">${esc(r.krachtZin)}</h1>
        <h3 style="font-size:16px;margin:26px 0 10px;">Ik help het beste met</h3>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">${pills}</div>
        <h3 style="font-size:16px;margin:26px 0 10px;">Jouw bewijsmuur</h3>
        <div style="display:grid;gap:8px;">${proof}</div>
        <h3 style="font-size:16px;margin:26px 0 10px;">De twijfel die je vandaag loslaat</h3>
        <p style="font-size:14.5px;">${esc(r.twijfelLoslaten)}</p>
      </div>
      <div class="card" style="margin-top:16px;">
        <div class="eyebrow">Volgende stap</div>
        <h3 style="font-size:18px;margin:6px 0 8px;">De spiegel van anderen</h3>
        <p style="color:var(--muted);font-size:14.5px;margin-bottom:14px;">Anderen zien jouw kracht vaak nog scherper dan jij. Stuur dit appje naar 3 mensen die je goed kennen en eerlijk zijn \u2014 en neem hun antwoorden mee naar je gratis kennismakingsgesprek. Samen leg ik ze naast jouw kaart.</p>
        <div style="background:#FFFBF4;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14.5px;margin-bottom:14px;">${esc(MIRROR_MSG)}</div>
        <button class="btn btn--primary" id="copymsg">${state.copiedMsg?"Gekopieerd!":"Kopieer dit appje"}</button>
      </div>
      <div class="card" style="margin-top:16px;background:var(--ink);border-color:var(--ink);">
        <div style="font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accentSoft);font-weight:700;">En nu?</div>
        <p style="color:#FDFDED;font-size:16px;margin:10px 0 20px;font-family:'Sodabery','Fraunces',serif;">${esc(r.conclusie)}</p>
        <a href="${BOOKING_URL}" target="_blank" rel="noreferrer" class="btn btn--accent">Plan je gratis kennismakingsgesprek</a>
      </div>
      <div class="row noprint">
        <button class="btn btn--ghost" id="copy">${state.copied?"Gekopieerd!":"Kopieer mijn kaart"}</button>
        <button class="btn btn--ghost" id="print">Bewaar als pdf</button>
        <button class="btn btn--ghost" id="again">Opnieuw</button>
      </div>
    </div>`;
  document.getElementById("copy").onclick = copyKaart;
  document.getElementById("copymsg").onclick = copyMsg;
  document.getElementById("print").onclick = () => window.print();
  document.getElementById("again").onclick = () => { state.phase="intro"; state.si=0; state.result=null; render(); };
}

function copyMsg(){
  navigator.clipboard.writeText(MIRROR_MSG).then(()=>{ state.copiedMsg=true; render(); setTimeout(()=>{state.copiedMsg=false; if(state.phase==="result") render();},1800); }).catch(()=>{});
}

async function generate(){
  state.phase = "loading"; render();
  const compiled = ALL.map(q => {
    const a = (state.answers[q.id]||"").trim();
    return a ? `Vraag: ${q.label}\nAntwoord: ${a}` : null;
  }).filter(Boolean).join("\n\n");
  try{
    const res = await fetch("/api/generate", {
      method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ answers: compiled })
    });
    if(!res.ok) throw new Error("bad status");
    const data = await res.json();
    const clean = (data.text||"").replace(/```json/g,"").replace(/```/g,"").trim();
    state.result = JSON.parse(clean);
    state.phase = "result"; render();
  }catch(e){
    state.phase = "error"; render();
  }
}

function copyKaart(){
  const r = state.result; if(!r) return;
  const txt = `MIJN VA KRACHT KAART\n\n${r.krachtZin}\n\nIk help het beste met:\n`
    + (r.helptMet||[]).map(x=>`\u2022 ${x}`).join("\n")
    + `\n\nMijn bewijsmuur:\n` + (r.bewijsmuur||[]).map(x=>`\u2022 ${x}`).join("\n")
    + `\n\nDe twijfel die ik loslaat:\n${r.twijfelLoslaten}\n\n${r.conclusie}`;
  navigator.clipboard.writeText(txt).then(()=>{ state.copied=true; render(); setTimeout(()=>{state.copied=false; if(state.phase==="result") render();},1800); }).catch(()=>{});
}

render();
</script>
